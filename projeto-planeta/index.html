<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hello World - Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="assets/img/logo.svg" alt="Logo Hello World">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Suporte</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="home">
            <div class="lado-esquerdo">
                <div class="content">
                    <p>Subtítulo de destaque</p>
                    <h1>Título principal da Landing Page</h1>
                    <p>Descrição detalhada sobre o produto ou serviço oferecido.</p>
                </div>
                <div class="btns">
                    <button>Começar <i class="fas fa-chevron-right"></i></button>
                    <button class="btn-secundario">Saiba Mais</button>
                </div>
            </div>
            <div class="lado-direito">
                <img src="assets/img/planeta.svg" alt="Planeta">
            </div>
        </section>
    </main>

</body>
</html>
